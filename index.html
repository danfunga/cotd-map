<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>COTD Map</title>

  <!-- CSS 연결 -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 상단 헤더 -->
  <header>
    <h1>🎣 COTD Map</h1>
    <p>Creatures of the Deep 인터랙티브 지도</p>
  </header>

  <!-- 검색 영역 -->
  <section id="controls">
    <input
      type="text"
      id="searchInput"
      placeholder="검색어를 입력하세요..."
    >
  </section>

  <!-- 지도 영역 -->
  <main>
    <div id="map">
      지도 영역 (나중에 Paradise Island 지도가 표시됩니다)
    </div>
  </main>

  <!-- JavaScript 연결 -->
  <script src="script.js"></script>
</body>
</html>
